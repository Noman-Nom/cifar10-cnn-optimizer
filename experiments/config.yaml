experiment:
  name: "CIFAR10_CNN_Q2"
  device: "cuda"
  n_runs: 10
  seeds: [42, 123, 999, 7, 13, 21, 77, 101, 256, 512]
  output_dir: "q2_results"

search_space:
  learning_rate:
    type: float
    min: 0.0001
    max: 0.003
    scale: log
  batch_size:
    type: int
    min: 32
    max: 256
    scale: log
  conv_channels_base:
    type: int
    min: 32
    max: 128
    scale: log
  num_conv_blocks:
    type: int
    min: 2
    max: 4
    scale: linear
  fc_hidden:
    type: int
    min: 64
    max: 512
    scale: linear
  dropout:
    type: float
    min: 0.1
    max: 0.5
    scale: linear
  weight_decay:
    type: float
    min: 0.00001
    max: 0.001
    scale: log

training:
  max_epochs: 200
  early_stopping_patience: 30
  retrain_max_epochs: 200

optimizers:
  random_search:
    enabled: true
    n_iterations: 15
  pso:
    enabled: false
  bo:
    enabled: false
  hyperband:
    enabled: false

baseline:
  enabled: true
  config:
    learning_rate: 0.001
    batch_size: 64
    conv_channels_base: 64
    num_conv_blocks: 2
    fc_hidden: 256
    dropout: 0.5
    weight_decay: 0.0001
